{% extends "base_public.html" %}
{% block title %}{{ meta_title|default:page.title }} | {{ site_config.site_name|default:"Proxy Soft" }}{% endblock %}
{% block content %}
<article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-12">
    <h1 class="text-3xl md:text-4xl font-bold text-proxyDark mb-8">{{ page.title }}</h1>
    <div class="prose-content text-slate-700">{{ page.content|safe }}</div>
</article>
{% endblock %}
