{% extends "iamadmin/base_dashboard.html" %}
{% block title %}My Profile | Proxy Soft Portal{% endblock %}
{% block page_heading %}My Profile{% endblock %}
{% block content %}
<form method="post" class="iam-form max-w-xl space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Full name</label>
        <input type="text" name="full_name" value="{{ profile.full_name|default:'' }}" maxlength="255"
            class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-proxyBlue outline-none"
            placeholder="Your full name">
        <p class="text-slate-500 text-xs mt-1">Shown in the dashboard header instead of first/last name.</p>
    </div>
    <button type="submit" class="bg-proxyBlue text-white font-bold py-2 px-6 rounded-xl">Save</button>
</form>
{% endblock %}
