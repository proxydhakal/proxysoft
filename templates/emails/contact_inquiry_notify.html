<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New inquiry — {{ site_name }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f1f5f9;padding:24px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(10,29,55,0.08);">
                    <tr>
                        <td style="background:linear-gradient(135deg,{{ primary_dark }} 0%,{{ primary }} 100%);padding:24px 28px;text-align:center;">
                            <p style="margin:0;color:#ffffff;font-size:18px;font-weight:700;">Someone sent an inquiry</p>
                            <p style="margin:8px 0 0 0;color:{{ accent }};font-size:13px;">Please check and reply from your dashboard or by email</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px 28px 8px 28px;color:#334155;font-size:15px;line-height:1.6;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                                <tr>
                                    <td style="padding:8px 0;color:#64748b;font-weight:600;width:100px;vertical-align:top;">Name</td>
                                    <td style="padding:8px 0;color:{{ primary_dark }};font-weight:600;">{{ name }}</td>
                                </tr>
                                <tr>
                                    <td style="padding:8px 0;color:#64748b;font-weight:600;vertical-align:top;">Email</td>
                                    <td style="padding:8px 0;"><a href="mailto:{{ email }}" style="color:{{ primary }};text-decoration:none;font-weight:600;">{{ email }}</a></td>
                                </tr>
                                <tr>
                                    <td style="padding:8px 0;color:#64748b;font-weight:600;vertical-align:top;">Subject</td>
                                    <td style="padding:8px 0;color:#334155;">{{ subject }}</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 28px 24px 28px;">
                            <p style="margin:0 0 8px 0;color:#64748b;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">Message</p>
                            <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;color:#334155;font-size:14px;line-height:1.65;">{{ message|linebreaksbr }}</div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 28px 28px 28px;text-align:center;">
                            <a href="{{ submissions_url }}" style="display:inline-block;background:{{ primary }};color:#ffffff;font-weight:700;font-size:14px;padding:12px 24px;border-radius:10px;text-decoration:none;">View submissions in admin</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color:{{ primary_dark }};padding:20px 24px;text-align:center;border-top:3px solid {{ accent }};">
                            <img src="{{ logo_url }}" alt="{{ site_name }}" width="120" style="max-width:160px;height:auto;display:block;margin:0 auto 12px auto;border:0;">
                            <p style="margin:0;color:#94a3b8;font-size:11px;">&copy; {{ year }} {{ site_name }}</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
