{% load static %}
{# Order: uploaded favicon → favicon_url → static/img/favicon.ico #}
{% if site_config and site_config.favicon %}
<link rel="icon" href="{{ request.scheme }}://{{ request.get_host }}{{ site_config.favicon.url }}" type="image/x-icon">
{% elif site_config and site_config.favicon_url %}
<link rel="icon" href="{{ site_config.favicon_url }}" type="image/x-icon">
{% else %}
<link rel="icon" href="{% static 'img/favicon.ico' %}" sizes="any">
{% endif %}
